# Cerberus Watchtower repo registry.
#
# Repos are AUTO-DISCOVERED: every child git repository under each [[roots]]
# entry is registered automatically, with its stack inferred from contents
# (sln -> dotnet, package.json+vue -> vue, pyproject/requirements -> python,
# *.tf -> terraform, gradle -> android, else mixed).
#
# [overrides.<folder-name>] customizes a discovered repo: id (keep stable -
# snapshots and caches are keyed by it), name, stack, group, and include=true
# to register a non-git project directory.

[[roots]]
path = 'C:\Users\aigor\_dev\_paytable'
group = "paytable"

[[roots]]
path = 'C:\Users\aigor\_dev\_cerberus'
group = "cerberus"

# --- PayTable overrides (preserve original ids + display names) ---

[overrides.payTableDotnet]
id = "paytable-dotnet"
name = "PayTable .NET"

[overrides.payTableVue]
id = "paytable-vue"
name = "PayTable Vue PWA"

[overrides.payTableShell]
id = "paytable-shell"
name = "PayTable Shell"
stack = "android"

[overrides.paytablemx]
id = "paytablemx"
name = "paytable.mx"
stack = "web"

[overrides.paytable-infrastructure]
id = "paytable-infrastructure"
name = "PayTable Infrastructure"
stack = "terraform"

[overrides.paytable-claude-config]
id = "paytable-claude-config"
name = "PayTable Claude Config"
stack = "config"

# --- Cerberus overrides ---

[overrides.Cerberus]
id = "cerberus"
name = "Cerberus (Financial)"

[overrides.cerberuslabsllc]
id = "cerberuslabsllc"
name = "cerberuslabs.tech Site"

[overrides.cerberus-content-manager]
id = "cerberus-content-manager"
name = "Content Manager"

[overrides.cerberus-markets]
id = "cerberus-markets"
name = "Cerberus Markets"
stack = "python"

[overrides.cerberus-home-hub]
id = "cerberus-home-hub"
name = "Home Hub"
stack = "mixed"

[overrides.cerberus-watchtower]
id = "cerberus-watchtower"
name = "Watchtower"
stack = "python"

[overrides.cerberus-claude-config]
id = "cerberus-claude-config"
name = "Cerberus Claude Config"
